name: PR Check

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]

jobs:
  quality:
    name: Type & Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10.x

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prettier
        run: pnpm prettier --check .

      - name: Type check
        run: pnpm tsc --noEmit

      - name: Lint
        run: pnpm lint
